<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#02060f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>Rijn Waterstanden</title>
<style>
  :root {
    --bg-1: #0c1e3a;
    --bg-2: #050b1a;
    --bg-3: #02060f;
    --card-1: rgba(30, 41, 59, 0.7);
    --card-2: rgba(15, 23, 42, 0.7);
    --border: rgba(255,255,255,0.06);
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --text-faint: #64748b;
    --text-very-faint: #475569;
    --accent: #22d3ee;
    --accent-dim: rgba(34, 211, 238, 0.6);
    --accent-bg: rgba(34, 211, 238, 0.1);
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --serif: "Iowan Old Style", "Charter", "Georgia", serif;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at top, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100vh;
    overscroll-behavior-y: contain;
  }
  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .wave-deco {
    position: absolute; inset: 0 0 auto 0; height: 220px;
    overflow: hidden; pointer-events: none; opacity: 0.3; z-index: 0;
  }
  .wave-deco svg { width: 100%; height: 100%; }
  .container {
    position: relative; z-index: 1;
    max-width: 440px; margin: 0 auto;
    padding: 16px 16px 40px;
  }

  header {
    padding: 14px 4px 12px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .title-block .eyebrow {
    font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--accent-dim); display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
  }
  .title-block h1 {
    font-family: var(--serif);
    font-weight: 300; font-size: 30px; line-height: 1.1;
    margin: 0; letter-spacing: -0.01em; color: var(--text);
  }
  .last-update {
    margin-top: 6px;
    font-size: 12px; color: var(--text-faint); font-variant-numeric: tabular-nums;
    display: flex; align-items: center; gap: 6px;
  }
  .last-update .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); }
  .last-update.fresh .dot   { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .last-update.stale .dot   { background: var(--warning); }
  .last-update.old .dot     { background: var(--danger); }
  .last-update.loading .dot { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.4} }

  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent-bg);
    border: 1px solid rgba(34, 211, 238, 0.3);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.15s, opacity 0.15s;
    padding: 0;
  }
  .icon-btn.muted {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--text-faint);
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .alert-banner {
    margin: 8px 4px 0;
    padding: 10px 12px;
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid rgba(248, 113, 113, 0.2);
    border-radius: 12px;
    font-size: 12px;
    color: #fca5a5;
    line-height: 1.4;
  }
  .alert-banner.info {
    background: rgba(52, 211, 153, 0.05);
    border-color: rgba(52, 211, 153, 0.15);
    color: #6ee7b7;
  }

  .section { margin-top: 22px; }
  .section-title {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-faint); margin: 0 4px 8px;
  }

  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--card-1), var(--card-2));
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 14px 16px;
  }
  .card::before {
    content: ""; position: absolute; right: -32px; top: -32px;
    width: 120px; height: 120px; border-radius: 50%;
    background: rgba(34, 211, 238, 0.05); filter: blur(40px);
    pointer-events: none;
  }
  .card.has-error { border-color: rgba(248, 113, 113, 0.25); }
  .card.healed { border-color: rgba(52, 211, 153, 0.2); }

  .row1 {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    position: relative;
  }
  .flag { font-size: 18px; }
  .name {
    flex: 1; font-size: 15px; font-weight: 500;
    color: var(--text); letter-spacing: -0.01em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .badge {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px; font-weight: 600;
  }
  .badge.waal { color: var(--accent-dim); background: var(--accent-bg); }
  .badge.healed { color: #6ee7b7; background: rgba(52, 211, 153, 0.1); }
  .trend { font-size: 16px; }
  .trend.up   { color: var(--success); }
  .trend.down { color: var(--warning); }
  .trend.flat { color: var(--text-faint); }

  .row2 {
    display: flex; align-items: flex-end; gap: 10px;
    position: relative;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .label {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-very-faint); font-weight: 500;
  }
  .stat .value {
    font-size: 24px; font-weight: 300;
    color: var(--text-dim); font-variant-numeric: tabular-nums;
    line-height: 1.05; letter-spacing: -0.02em;
  }
  .stat .unit { font-size: 11px; color: var(--text-very-faint); margin-left: 3px; }
  .sep { font-size: 18px; color: var(--text-very-faint); padding: 0 2px 4px; }
  .stat.result .label { color: var(--accent-dim); }
  .stat.result .value { color: var(--accent); font-weight: 500; }
  .stat.result .unit { color: var(--accent-dim); }

  .stat.vr {
    cursor: pointer; padding: 4px 8px; margin: -4px -2px; border-radius: 8px;
  }
  .stat.vr:active { background: rgba(255,255,255,0.04); }
  .stat.vr .label::after {
    content: " ✎"; font-size: 8px;
    color: var(--text-very-faint); margin-left: 2px;
  }
  .vr-value {
    font-size: 13px; color: var(--text-faint); font-weight: 400;
    line-height: 1.6;
  }

  .spark-area {
    margin-left: auto; display: flex; flex-direction: column;
    align-items: flex-end; justify-content: flex-end; gap: 4px;
  }

  .error-row {
    margin-top: 8px; padding: 6px 8px;
    font-size: 11px; color: var(--danger);
    background: rgba(248, 113, 113, 0.06);
    border-radius: 8px;
    word-break: break-word;
  }
  .heal-row {
    margin-top: 6px;
    font-size: 10px; color: #6ee7b7;
    letter-spacing: 0.01em;
  }
  .skeleton .value { color: var(--text-very-faint); opacity: 0.5; }

  /* Sheet (edit + info) */
  .sheet-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(2, 6, 15, 0.6);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, #0f172a 0%, #050b1a 100%);
    border-top-left-radius: 28px; border-top-right-radius: 28px;
    border-top: 1px solid var(--border);
    padding: 14px 20px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 101;
    max-width: 440px; margin: 0 auto;
    max-height: 85vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.15);
    margin: 0 auto 16px;
  }
  .sheet h2 {
    font-family: var(--serif);
    font-weight: 400; font-size: 22px; margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sheet .subtitle { font-size: 13px; color: var(--text-faint); margin: 0 0 18px; }
  .sheet-form { display: flex; flex-direction: column; gap: 12px; }
  .sheet label {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: -4px;
  }
  .sheet input[type=number] {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text); font-size: 22px; font-weight: 300;
    font-variant-numeric: tabular-nums;
    -webkit-appearance: none; appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .sheet input[type=number]:focus { border-color: var(--accent-dim); }
  .sheet-buttons { display: flex; gap: 10px; margin-top: 6px; }
  .sheet button {
    flex: 1; padding: 14px; border-radius: 14px; border: none;
    font-size: 15px; font-weight: 500; cursor: pointer;
    font-family: inherit;
  }
  .btn-cancel { background: rgba(255,255,255,0.06); color: var(--text); }
  .btn-save { background: var(--accent); color: #04121f; }
  .btn-save:active { opacity: 0.7; }
  .btn-reset {
    background: transparent; color: var(--text-faint);
    font-size: 12px; padding: 8px; margin-top: 4px;
    text-decoration: underline;
  }

  .info-section {
    margin: 14px 0; padding: 14px 0;
    border-top: 1px solid var(--border);
    font-size: 13px; color: var(--text-dim); line-height: 1.6;
  }
  .info-section:first-of-type { border-top: none; padding-top: 0; }
  .info-section h3 {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent-dim); margin: 0 0 8px; font-weight: 600;
  }
  .info-section p { margin: 0 0 8px; }
  .info-section ul { margin: 4px 0; padding-left: 16px; color: var(--text-faint); font-size: 12px; }

  footer {
    margin-top: 28px;
    font-size: 11px; color: var(--text-very-faint);
    text-align: center; line-height: 1.6;
    padding: 0 20px;
  }

  .card { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
  .card:nth-child(1) { animation-delay: 0.02s; }
  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.08s; }
  .card:nth-child(4) { animation-delay: 0.11s; }
  .card:nth-child(5) { animation-delay: 0.14s; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="wave-deco">
  <svg viewBox="0 0 400 200" preserveAspectRatio="none">
    <defs>
      <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="M0,100 Q100,60 200,90 T400,80 L400,200 L0,200 Z" fill="url(#wg)"/>
    <path d="M0,130 Q100,100 200,120 T400,110 L400,200 L0,200 Z" fill="url(#wg)" opacity="0.5"/>
  </svg>
</div>

<div class="container">

  <header>
    <div class="title-block">
      <div class="eyebrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
          <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
          <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
        </svg>
        Live
      </div>
      <h1>Rijn Waterstanden</h1>
      <div class="last-update" id="lastUpdate">
        <span class="dot"></span>
        <span id="lastUpdateText">Laden…</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn muted" id="infoBtn" aria-label="Info">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
        </svg>
      </button>
      <button class="icon-btn" id="updateBtn" aria-label="Update">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15.5-6.4L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-15.5 6.4L3 16"/>
          <path d="M3 21v-5h5"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="alertArea"></div>

  <main id="main"></main>

  <footer>
    Bron: pegelonline.wsv.de · wasserkarte.net<br>
    Demo / hulpmiddel. Geen rechten of aansprakelijkheid aan te ontlenen.
  </footer>

</div>

<!-- Sheet (used for both edit and info) -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div id="sheetContent"></div>
</div>

<script>
// ---------- CONFIG ----------
const DEFAULT_VR = {
  "maxau": -180,
  "oestrich": 110,
  "kaub": 100,
  "koblenz": 130,
  "koeln": 80,
  "duesseldorf": 130,
  "duisburg-ruhrort": 20,
  "wesel": 80,
  "nijmegen": -260,
};
const GROUPS = [
  { titel: "Bovenrijn",    keys: ["maxau","oestrich","kaub"] },
  { titel: "Middenrijn",   keys: ["koblenz","koeln","duesseldorf"] },
  { titel: "Niederrhein",  keys: ["duisburg-ruhrort","wesel"] },
  { titel: "Nederland",    keys: ["nijmegen"] },
];
const LS_VR_KEY = "rijn.vuistregels.v1";
const LS_DATA_KEY = "rijn.lastdata.v1";

// ---------- STATE ----------
let vuistregels = loadVR();
let lastData = loadLastData();
let editingKey = null;

function loadVR() {
  try {
    const raw = localStorage.getItem(LS_VR_KEY);
    if (!raw) return { ...DEFAULT_VR };
    return { ...DEFAULT_VR, ...JSON.parse(raw) };
  } catch { return { ...DEFAULT_VR }; }
}
function saveVR() { localStorage.setItem(LS_VR_KEY, JSON.stringify(vuistregels)); }
function loadLastData() {
  try { const raw = localStorage.getItem(LS_DATA_KEY); return raw ? JSON.parse(raw) : null; }
  catch { return null; }
}
function saveLastData(d) { try { localStorage.setItem(LS_DATA_KEY, JSON.stringify(d)); } catch {} }

// ---------- HELPERS ----------
function formatUpdated(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const diffMin = Math.floor((Date.now() - d) / 60000);
  if (diffMin < 1)  return "Net bijgewerkt";
  if (diffMin < 60) return `${diffMin} min geleden`;
  const diffH = Math.floor(diffMin / 60);
  if (diffH < 24)   return `${diffH} u geleden`;
  return d.toLocaleString("nl-NL", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
}
function freshnessClass(iso) {
  if (!iso) return "old";
  const diffMin = (Date.now() - new Date(iso)) / 60000;
  if (diffMin < 40) return "fresh";   // script draait elke 30 min
  if (diffMin < 90) return "stale";
  return "old";
}
function displayName(key) {
  return ({
    "maxau":"Maxau","oestrich":"Oestrich","kaub":"Kaub","koblenz":"Koblenz",
    "koeln":"Köln","duesseldorf":"Düsseldorf","duisburg-ruhrort":"Duisburg",
    "wesel":"Wesel","nijmegen":"Nijmegen"
  })[key] || key;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
}

function sparkline(history, w = 72, h = 28) {
  if (!history || history.length < 2) return "";
  const vals = history.map(p => p.v).filter(v => typeof v === "number");
  if (vals.length < 2) return "";
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const step = w / (vals.length - 1);
  const pts = vals.map((v, i) => `${(i*step).toFixed(1)},${(h - ((v - min) / range) * h).toFixed(1)}`).join(" ");
  const last = vals[vals.length - 1];
  const lastY = (h - ((last - min) / range) * h).toFixed(1);
  return `<svg width="${w}" height="${h}" style="overflow:visible">
    <polyline fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>
    <circle cx="${w}" cy="${lastY}" r="2.2" fill="#22d3ee"/>
  </svg>`;
}

function trendIcon(trend) {
  if (trend === 1)  return `<span class="trend up">↑</span>`;
  if (trend === -1) return `<span class="trend down">↓</span>`;
  return `<span class="trend flat">–</span>`;
}

// ---------- RENDER ----------
function render() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  updateLastUpdateUI();
  renderAlerts();

  const allStations = (lastData && lastData.stations) || [];
  const byKey = Object.fromEntries(allStations.map(s => [s.key, s]));

  for (const group of GROUPS) {
    const sec = document.createElement("section");
    sec.className = "section";
    sec.innerHTML = `<div class="section-title">${group.titel}</div><div class="cards"></div>`;
    const cards = sec.querySelector(".cards");
    for (const key of group.keys) {
      cards.appendChild(renderCard(byKey[key], key));
    }
    main.appendChild(sec);
  }
}

function renderAlerts() {
  const area = document.getElementById("alertArea");
  area.innerHTML = "";
  if (!lastData || !lastData.stations) return;

  const errors = lastData.stations.filter(s => s.error);
  const healed = lastData.stations.filter(s => s.slugFixed);

  if (errors.length) {
    const div = document.createElement("div");
    div.className = "alert-banner";
    div.innerHTML = `⚠ ${errors.length} station${errors.length>1?"s":""} kon niet worden opgehaald — zie kaart${errors.length>1?"en":""} hieronder.`;
    area.appendChild(div);
  }
  if (healed.length) {
    const div = document.createElement("div");
    div.className = "alert-banner info";
    div.innerHTML = `✓ Auto-herstel actief op ${healed.length} station${healed.length>1?"s":""} — overweeg de slug bij te werken in <code>scripts/fetch-data.mjs</code>.`;
    area.appendChild(div);
  }
}

function renderCard(data, key) {
  const card = document.createElement("div");
  card.className = "card";
  if (data && data.error) card.classList.add("has-error");
  if (data && data.slugFixed) card.classList.add("healed");

  const vr = vuistregels[key];
  const hasPegel = data && typeof data.pegel === "number";
  const pegelStr = hasPegel ? `${Math.round(data.pegel)}` : "—";
  const scheepStr = hasPegel ? `${Math.round(data.pegel + vr)}` : "—";
  const vrStr = `${vr >= 0 ? "+" : ""}${vr}`;
  const naam = data ? data.naam : displayName(key);
  const land = data ? data.land : "";
  const waalBadge = (data && data.waal) ? `<span class="badge waal">Waal</span>` : "";
  const healBadge = (data && data.slugFixed) ? `<span class="badge healed">Hersteld</span>` : "";
  const trend = (data && typeof data.trend === "number" && hasPegel) ? trendIcon(data.trend) : "";
  const spark = data && data.history ? sparkline(data.history) : "";

  card.innerHTML = `
    <div class="row1">
      <span class="flag">${land}</span>
      <span class="name">${naam}</span>
      ${waalBadge}
      ${healBadge}
      ${trend}
    </div>
    <div class="row2">
      <div class="stat">
        <div class="label">Pegel</div>
        <div class="value ${hasPegel ? "" : "skeleton"}">${pegelStr}<span class="unit">cm</span></div>
      </div>
      <div class="sep">/</div>
      <div class="stat vr" data-key="${key}">
        <div class="label">${vrStr}</div>
        <div class="vr-value">vuistregel</div>
      </div>
      <div class="sep">=</div>
      <div class="stat result">
        <div class="label">AFLAADDIEPTE</div>
        <div class="value ${hasPegel ? "" : "skeleton"}">${scheepStr}<span class="unit">cm</span></div>
      </div>
      <div class="spark-area">${spark}</div>
    </div>
    ${data && data.error ? `<div class="error-row">⚠ ${escapeHtml(data.error)}</div>` : ""}
    ${data && data.slugFixed ? `<div class="heal-row">↻ ${escapeHtml(data.slugFixed)}</div>` : ""}
  `;

  card.querySelector(".stat.vr").addEventListener("click", (e) => {
    e.stopPropagation();
    openEditSheet(key);
  });

  return card;
}

function updateLastUpdateUI() {
  const el = document.getElementById("lastUpdate");
  const txt = document.getElementById("lastUpdateText");
  if (!lastData || !lastData.updated) {
    el.className = "last-update old";
    txt.textContent = "Nog niet bijgewerkt";
    return;
  }
  el.className = "last-update " + freshnessClass(lastData.updated);
  txt.textContent = formatUpdated(lastData.updated);
}

// ---------- FETCH ----------
// PEGELONLINE-stations die we direct vanuit de browser proberen op te halen.
// Werkt als PEGELONLINE CORS toelaat (meestal wel). Anders fallback naar data.json.
const DIRECT_STATIONS = [
  { key: "maxau",            slug: "maxau" },
  { key: "oestrich",         slug: "oestrich" },
  { key: "kaub",             slug: "kaub" },
  { key: "koblenz",          slug: "koblenz" },
  { key: "koeln",            slug: "KÖLN" },
  { key: "duesseldorf",      slug: "DÜSSELDORF" },
  { key: "duisburg-ruhrort", slug: "duisburg-ruhrort" },
  { key: "wesel",            slug: "wesel" },
];
const PEG_BASE = "https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations";

async function fetchDataJson() {
  // Cache-bust — GH Pages CDN cachet te lang
  const r = await fetch(`data.json?t=${Date.now()}`, { cache: "no-store" });
  if (!r.ok) throw new Error(`data.json HTTP ${r.status}`);
  const data = await r.json();
  if (!data.stations || !Array.isArray(data.stations) || data.stations.length === 0) {
    throw new Error("data.json is nog leeg");
  }
  return data;
}

async function fetchLiveOne(s) {
  const url = `${PEG_BASE}/${encodeURIComponent(s.slug)}/W/currentmeasurement.json`;
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  return {
    key: s.key,
    pegel: d.value,
    timestamp: d.timestamp,
    trend: d.trend ?? 0,
  };
}

async function fetchData() {
  const btn = document.getElementById("updateBtn");
  const el  = document.getElementById("lastUpdate");
  const txt = document.getElementById("lastUpdateText");

  btn.classList.add("spinning");
  el.className = "last-update loading";
  txt.textContent = "Bijwerken…";

  // Stap 1: baseline uit data.json (Nijmegen + history-sparklines komen hieruit)
  try {
    const data = await fetchDataJson();
    lastData = data;
  } catch (e) {
    // data.json mislukte — als we niets in cache hebben, geven we op
    if (!lastData || !lastData.stations || !lastData.stations.length) {
      txt.textContent = e.message;
      el.className = "last-update old";
      btn.classList.remove("spinning");
      return;
    }
  }

  // Stap 2: parallel direct ophalen bij PEGELONLINE (als CORS toelaat)
  const results = await Promise.all(
    DIRECT_STATIONS.map(s =>
      fetchLiveOne(s)
        .then(r => ({ ok: true, ...r }))
        .catch(e => ({ ok: false, key: s.key, error: e.message }))
    )
  );

  // Stap 3: live-resultaten in lastData mergen
  let liveCount = 0;
  for (const r of results) {
    if (!r.ok) continue;
    const st = lastData.stations.find(s => s.key === r.key);
    if (st) {
      st.pegel = r.pegel;
      st.timestamp = r.timestamp;
      st.trend = r.trend;
      st.error = null;
      st.slugFixed = null;
      st.liveDirect = true;
      liveCount++;
    }
  }

  // Stap 4: timestamp updaten als minstens 1 live-fetch lukte
  if (liveCount > 0) {
    lastData.updated = new Date().toISOString();
    lastData._liveFetchCount = liveCount;
  } else {
    lastData._liveFetchCount = 0;
  }

  saveLastData(lastData);
  render();

  // Sub-tekst aanvullen met live-status
  if (liveCount > 0 && liveCount < DIRECT_STATIONS.length) {
    txt.textContent = `${liveCount}/${DIRECT_STATIONS.length} live · rest uit cache`;
  } else if (liveCount === 0) {
    // Helemaal geen directe fetches gelukt (CORS of offline) — gebruik data.json
    el.className = "last-update " + freshnessClass(lastData.updated);
    txt.textContent = `${formatUpdated(lastData.updated)} (via cache)`;
  }

  btn.classList.remove("spinning");
}

// ---------- SHEET ----------
function openSheetWithHTML(html) {
  document.getElementById("sheetContent").innerHTML = html;
  document.getElementById("sheetOverlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}
function closeSheet() {
  document.getElementById("sheetOverlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
  editingKey = null;
}

function openEditSheet(key) {
  editingKey = key;
  openSheetWithHTML(`
    <h2>Vuistregel — ${displayName(key)}</h2>
    <p class="subtitle">Wordt opgeteld bij Pegel = aflaaddiepte. Standaard: ${DEFAULT_VR[key]} cm.</p>
    <div class="sheet-form">
      <label>Waarde in cm (mag negatief)</label>
      <input type="number" id="sheetInput" inputmode="numeric" step="1" value="${vuistregels[key]}">
      <div class="sheet-buttons">
        <button class="btn-cancel" id="sheetCancel">Annuleer</button>
        <button class="btn-save" id="sheetSave">Bewaar</button>
      </div>
      <button class="btn-reset" id="sheetReset">Terug naar standaardwaarde</button>
    </div>
  `);
  setTimeout(() => document.getElementById("sheetInput").focus(), 280);
  document.getElementById("sheetCancel").onclick = closeSheet;
  document.getElementById("sheetSave").onclick = () => {
    const val = parseInt(document.getElementById("sheetInput").value);
    if (!Number.isNaN(val)) {
      vuistregels[editingKey] = val;
      saveVR(); render();
    }
    closeSheet();
  };
  document.getElementById("sheetReset").onclick = () => {
    vuistregels[editingKey] = DEFAULT_VR[editingKey];
    saveVR(); render(); closeSheet();
  };
}

function openInfoSheet() {
  openSheetWithHTML(`
    <h2>Over deze app</h2>
    <p class="subtitle">Hoe het werkt en wat je kunt verwachten</p>

    <div class="info-section">
      <h3>Pegel · Vuistregel · Aflaaddiepte</h3>
      <p><b>Pegel</b> is de gemeten waterhoogte in cm. <b>Vuistregel</b> is jouw correctiewaarde per station. <b>Aflaaddiepte</b> (cyaan) = Pegel + vuistregel.</p>
      <p>Tik op het vuistregel-cijfer op een kaart om 'm aan te passen. Wordt lokaal bewaard op dit apparaat.</p>
    </div>

    <div class="info-section">
      <h3>Updates</h3>
      <p>Een GitHub Action haalt de data elke 30 minuten op en schrijft 'm naar <code>data.json</code> in de repo. De update-knop herlaadt dat bestand met cache-bust.</p>
      <p>Wil je een directe live-fetch? Trigger de Action handmatig in GitHub: Actions → Update waterstanden → Run workflow.</p>
    </div>

    <div class="info-section">
      <h3>Self-healing</h3>
      <p>Als een PEGELONLINE-slug niet meer werkt, zoekt het script automatisch de juiste op in de volledige stationslijst. Lukt dat, dan zie je een "Hersteld"-badge op de kaart en een groene banner bovenaan met de suggestie 'm permanent in de code bij te werken.</p>
    </div>

    <div class="info-section">
      <h3>Bronnen</h3>
      <ul>
        <li>pegelonline.wsv.de — Duitse stations (officiële WSV-API)</li>
        <li>wasserkarte.net — Nijmegen-haven</li>
      </ul>
    </div>

    <div class="sheet-buttons" style="margin-top: 18px;">
      <button class="btn-save" id="infoClose">Sluit</button>
    </div>
  `);
  document.getElementById("infoClose").onclick = closeSheet;
}

document.getElementById("sheetOverlay").addEventListener("click", closeSheet);

// ---------- INIT ----------
document.getElementById("updateBtn").addEventListener("click", fetchData);
document.getElementById("infoBtn").addEventListener("click", openInfoSheet);

render();
fetchData();

setInterval(() => { if (!document.hidden) fetchData(); }, 5 * 60 * 1000);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && lastData && lastData.updated) {
    const ageMin = (Date.now() - new Date(lastData.updated)) / 60000;
    if (ageMin > 5) fetchData();
  }
});

// ---------- SERVICE WORKER (offline support) ----------
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => {
      console.warn("SW registratie mislukt:", e.message);
    });
  });
}
</script>
