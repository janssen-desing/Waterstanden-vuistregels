name: Update waterstanden

on:
  schedule:
    # Elke 30 minuten. GitHub kan een paar minuten vertraging hebben bij hoge belasting.
    - cron: "*/30 * * * *"
  workflow_dispatch:        # handmatig kunnen triggeren vanuit de Actions-tab
  push:
    branches: [main]
    paths:
      - "scripts/fetch-data.mjs"
      - ".github/workflows/update-data.yml"

permissions:
  contents: write           # script mag data.json terug-pushen

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch waterstanden
        run: node scripts/fetch-data.mjs

      - name: Commit & push als data.json gewijzigd is
        run: |
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "✓ data.json gecommit"
          else
            echo "Geen wijziging in data.json"
          fi
